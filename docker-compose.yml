services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lumo_signal
      POSTGRES_USER: lumo
      POSTGRES_PASSWORD: lumo_dev_password
    ports:
      - "5433:5432"
    volumes:
      - lumo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumo -d lumo_signal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lumo_postgres_data:
