services:
  app:
    build: .
    restart: unless-stopped
    # Allows the container to reach host's PostgreSQL via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Bind only to localhost — Nginx on the host proxies to this port
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_VK_ID: ${AUTH_VK_ID}
      AUTH_VK_SECRET: ${AUTH_VK_SECRET}
      AUTH_YANDEX_ID: ${AUTH_YANDEX_ID}
      AUTH_YANDEX_SECRET: ${AUTH_YANDEX_SECRET}
      NODE_ENV: production
